# DESCRIPTION: Docker Compose file to easily run a PostgreSQL database for local development.

version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: clarity-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: claritydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: