version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=wholesaledb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The Next.js app service is commented out by default.
  # It's often easier to run `npm run dev` on your host machine for hot-reloading.
  # You can uncomment this to run the app in a container if you prefer.
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   restart: always
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     - db
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@db:5432/wholesaledb?schema=public
  #     - NEXTAUTH_SECRET=YOUR_NEXTAUTH_SECRET
  #     - NEXTAUTH_URL=http://localhost:3000

volumes:
  postgres_data: